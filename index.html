<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>SD Comayagua | Inventario</title>
  <meta name="description" content="Panel premium de inventario para SD Comayagua, optimizado para celular y GitHub Pages.">
  <meta name="theme-color" content="#081120">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="icon" type="image/png" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body class="theme-dark login-page">
  <main class="login-shell">
    <section class="login-panel glass-panel">
      <div class="brand-lockup">
        <div class="brand-mark">SD</div>
        <div>
          <p class="eyebrow">Inventario privado</p>
          <h1>SD Comayagua</h1>
          <p class="support-copy">Diseño móvil premium tipo app, pensado para administrar stock con estilo profesional.</p>
        </div>
      </div>

      <div class="login-badges">
        <span class="mini-badge">Seguro</span>
        <span class="mini-badge">GitHub Pages</span>
        <span class="mini-badge">Optimizado para celular</span>
      </div>

      <div class="field-group">
        <label for="inv-user">Usuario</label>
        <input id="inv-user" type="text" autocomplete="username" placeholder="Ej: sdcomayagua">
      </div>

      <div class="field-group">
        <label for="inv-pass">Contraseña</label>
        <input id="inv-pass" type="password" autocomplete="current-password" placeholder="Ingresa tu contraseña">
      </div>

      <button class="btn-primary" onclick="invLogin()">Entrar al panel</button>

      <div class="login-footer-row">
        <button class="btn-ghost" type="button" id="theme-toggle" onclick="toggleTheme()">Tema claro</button>
        <p class="login-note">Acceso para administradores autorizados</p>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
