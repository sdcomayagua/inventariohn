<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventario SD-Comayagua</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-wrapper">
  <div class="login-card">
    <h1>Inventario SD-Comayagua</h1>

    <div class="field-group">
      <label for="inv-user">Usuario</label>
      <input id="inv-user" placeholder="Ingresa tu usuario">
    </div>

    <div class="field-group">
      <label for="inv-pass">Contraseña</label>
      <input id="inv-pass" type="password" placeholder="Ingresa tu contraseña">
    </div>

    <button class="btn-primary" onclick="invLogin()">Ingresar</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
