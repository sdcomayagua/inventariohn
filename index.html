<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventario SD-Comayagua</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="theme-dark">

<div class="app-wrapper">
  <div class="login-card glass">
    <div class="login-logo">
      <div class="logo-circle"></div>
      <span>SD-Comayagua</span>
    </div>

    <h1>Panel Gamer de Inventario</h1>
    <p class="login-subtitle">Acceso solo para administradores autorizados.</p>

    <div class="field-group">
      <label for="inv-user">PIN (6 dígitos)</label>
      <input id="inv-user" type="password" maxlength="6" placeholder="Ingresa tu PIN">
    </div>

    <button class="btn-primary" onclick="invLogin()">Ingresar</button>

    <p class="login-hint">Gabriel y JarCo tienen acceso total.</p>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
