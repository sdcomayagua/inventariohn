<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>SDCOMAYAGUA | Admin</title>
  <meta name="description" content="Acceso admin para SDCOMAYAGUA.">
  <meta name="theme-color" content="#0b0f16">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="icon" type="image/png" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body class="theme-dark login-page">
  <main class="login-shell">
    <section class="login-panel glass-panel premium-login-panel">
      <div class="login-badge">SDCOMAYAGUA</div>
      <div class="brand-copy">
        <p class="eyebrow">Acceso administrativo</p>
        <h1>SDCOMAYAGUA</h1>
        <p class="support-copy">Ingresa al panel premium de ventas, productos y comprobantes.</p>
      </div>

      <div class="field-group">
        <label for="inv-user">Usuario</label>
        <input id="inv-user" type="text" autocomplete="username" placeholder="Usuario">
      </div>

      <div class="field-group">
        <label for="inv-pass">Contraseña</label>
        <input id="inv-pass" type="password" autocomplete="current-password" placeholder="Contraseña">
      </div>


      <button class="btn-primary premium-login-btn" onclick="invLogin()">Entrar</button>

      <div class="login-footer-row">
        <div class="login-footnote">Ventas · productos · comprobantes</div>
        <button class="btn-ghost login-theme-btn" type="button" id="theme-toggle" onclick="toggleTheme()">◐</button>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
