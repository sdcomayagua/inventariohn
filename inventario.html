<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Tienda Gamer | Admin</title>
  <meta name="description" content="Tienda Gamer: panel admin premium con estética tipo app para celular.">
  <meta name="theme-color" content="#0b0f16">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="icon" type="image/png" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body class="theme-dark app-page">
  <div class="app-shell app-shell-admin">
    <header class="app-header glass-panel app-store-topbar">
      <div class="brand-row brand-row-admin">
        <div class="user-chip" id="inv-avatar">SD</div>
        <div>
          <h1 class="app-title">Tienda Gamer</h1>
          <p class="app-subtitle" id="inv-welcome">Admin</p>
        </div>
      </div>
      <div class="header-tools">
        <button class="icon-btn" id="theme-toggle" onclick="toggleTheme()" aria-label="Cambiar tema">☀️</button>
        <button class="icon-btn" onclick="invLogout()" aria-label="Cerrar sesión">⎋</button>
      </div>
    </header>

    <section class="admin-strip">
      <span class="hero-pill" id="inv-role">Administrador</span>
      <span class="mini-badge">Panel admin</span>
    </section>

    <section class="stats-grid stats-grid-appstore">
      <article class="stat-card glass-panel">
        <span>Total productos</span>
        <strong id="dash-total-products">0</strong>
      </article>
      <article class="stat-card glass-panel">
        <span>Unidades</span>
        <strong id="dash-total-qty">0</strong>
      </article>
      <article class="stat-card glass-panel accent">
        <span>Valor</span>
        <strong id="dash-total-value">0.00</strong>
      </article>
      <article class="stat-card glass-panel warn">
        <span>Agotados</span>
        <strong id="dash-out-count">0</strong>
      </article>
    </section>

    <section class="toolbar-stack toolbar-stack-app" id="productos">
      <div class="search-card glass-panel search-card-appstore">
        <input id="inv-search" class="search-input" placeholder="Buscar producto o categoría">
      </div>

      <div class="action-scroller action-scroller-appstore">
        <button class="action-chip active" onclick="invOpenModal(false)">Agregar</button>
        <button class="action-chip" onclick="loadProducts(true)">Actualizar</button>
        <button class="action-chip" id="install-btn" style="display:none;" onclick="installApp()">Instalar</button>
      </div>

      <div class="filter-grid glass-panel filter-grid-appstore">
        <div class="field-group inline">
          <label for="inv-filter">Categoría</label>
          <select id="inv-filter">
            <option value="all">Todas</option>
          </select>
        </div>

        <div class="field-group inline">
          <label for="inv-stock-filter">Stock</label>
          <select id="inv-stock-filter">
            <option value="all">Todo</option>
            <option value="in">Con stock</option>
            <option value="out">Agotados</option>
          </select>
        </div>

        <div class="field-group inline two-col">
          <label for="inv-min-price">Precio mínimo</label>
          <input id="inv-min-price" type="number" min="0" step="0.01" placeholder="0">
        </div>

        <div class="field-group inline two-col">
          <label for="inv-max-price">Precio máximo</label>
          <input id="inv-max-price" type="number" min="0" step="0.01" placeholder="0">
        </div>

        <div class="field-group inline two-col">
          <label for="inv-sort">Ordenar por</label>
          <select id="inv-sort">
            <option value="featured">Destacados</option>
            <option value="name">Nombre A-Z</option>
            <option value="priceAsc">Precio menor</option>
            <option value="priceDesc">Precio mayor</option>
            <option value="qtyDesc">Más stock</option>
            <option value="qtyAsc">Menos stock</option>
          </select>
        </div>

        <div class="field-group inline two-col">
          <label for="inv-items-per-page">Por página</label>
          <select id="inv-items-per-page" onchange="invChangeItemsPerPage()">
            <option value="8">8</option>
            <option value="12" selected>12</option>
            <option value="24">24</option>
          </select>
        </div>
      </div>
    </section>

    <section class="catalog-section">
      <div class="section-head section-head-clean">
        <h3 class="section-title">Productos</h3>
        <span class="results-count" id="results-count">0 resultados</span>
      </div>
      <div class="products-list" id="inv-products"></div>
      <div class="empty-state glass-panel" id="inv-empty" style="display:none;">
        <div class="empty-icon">◌</div>
        <h3>Sin productos</h3>
        <p>Agrega un producto nuevo para comenzar.</p>
      </div>
      <div class="pagination" id="inv-pagination"></div>
    </section>

    <button class="fab-add" onclick="invOpenModal(false)" aria-label="Agregar producto">+</button>
  </div>

  <div class="modal" id="inv-modal">
    <div class="modal-content modal-form">
      <div class="modal-head">
        <div>
          <p class="eyebrow">Catálogo</p>
          <h2 id="inv-modal-title">Agregar producto</h2>
        </div>
        <button class="icon-btn" onclick="invCloseModal()" aria-label="Cerrar">✕</button>
      </div>

      <div class="field-group">
        <label for="inv-name">Nombre del producto</label>
        <input id="inv-name" placeholder="Ej: Audífonos Bluetooth">
      </div>

      <div class="form-grid">
        <div class="field-group inline">
          <label for="inv-price">Precio</label>
          <input id="inv-price" type="number" step="0.01" min="0" placeholder="0.00">
        </div>

        <div class="field-group inline">
          <label for="inv-qty">Cantidad</label>
          <input id="inv-qty" type="number" min="0" placeholder="0">
        </div>
      </div>

      <div class="field-group">
        <label for="inv-category">Categoría</label>
        <input id="inv-category" placeholder="Ej: Audífonos, Mouse, Teclado">
      </div>

      <div class="field-group">
        <label>Imágenes del producto</label>
        <div class="image-upload-box">
          <label class="image-slot">
            <span class="img-label">Imagen 1</span>
            <input id="inv-img1" type="file" accept="image/*" onchange="invPreviewImage(this, 'prev1')">
            <img id="prev1" class="img-preview" alt="Preview 1">
          </label>
          <label class="image-slot">
            <span class="img-label">Imagen 2</span>
            <input id="inv-img2" type="file" accept="image/*" onchange="invPreviewImage(this, 'prev2')">
            <img id="prev2" class="img-preview" alt="Preview 2">
          </label>
          <label class="image-slot">
            <span class="img-label">Imagen 3</span>
            <input id="inv-img3" type="file" accept="image/*" onchange="invPreviewImage(this, 'prev3')">
            <img id="prev3" class="img-preview" alt="Preview 3">
          </label>
          <label class="image-slot">
            <span class="img-label">Imagen 4</span>
            <input id="inv-img4" type="file" accept="image/*" onchange="invPreviewImage(this, 'prev4')">
            <img id="prev4" class="img-preview" alt="Preview 4">
          </label>
          <label class="image-slot">
            <span class="img-label">Imagen 5</span>
            <input id="inv-img5" type="file" accept="image/*" onchange="invPreviewImage(this, 'prev5')">
            <img id="prev5" class="img-preview" alt="Preview 5">
          </label>
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn-primary" onclick="invSaveProduct()">Guardar producto</button>
        <button class="btn-secondary" onclick="invCloseModal()">Cancelar</button>
      </div>
    </div>
  </div>

  <div class="modal" id="detail-modal">
    <div class="modal-content modal-viewer">
      <div class="modal-head">
        <div>
          <p class="eyebrow">Detalle del producto</p>
          <h2 id="detail-name">Producto</h2>
        </div>
        <button class="icon-btn" onclick="closeDetailModal()" aria-label="Cerrar">✕</button>
      </div>

      <div class="detail-gallery">
        <img id="detail-main-img" class="detail-main-img" alt="Imagen principal del producto">
        <div class="detail-thumbs" id="detail-thumbs"></div>
      </div>

      <div class="detail-meta">
        <div class="detail-price" id="detail-price">Lps. 0.00</div>
        <div class="detail-tags">
          <span class="tag" id="detail-category">Categoría</span>
          <span class="tag" id="detail-stock">Stock</span>
        </div>
      </div>

      <div class="detail-actions">
        <button class="btn-primary" id="detail-edit-btn">Editar</button>
        <button class="btn-secondary" id="detail-delete-btn">Eliminar</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
