<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventario SD-Comayagua</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="inv-panel">

  <div class="top-bar">
    <button onclick="invLogout()">Cerrar sesión</button>

    <select id="inv-items-per-page" onchange="invChangeItemsPerPage()">
      <option value="5">5 por página</option>
      <option value="10" selected>10 por página</option>
      <option value="20">20 por página</option>
      <option value="50">50 por página</option>
    </select>

    <button onclick="invOpenModal()">Agregar producto</button>
  </div>

  <!-- DASHBOARD -->
  <div id="inv-dashboard" class="dashboard">
    <div class="dash-card">
      <h3>Total productos</h3>
      <span id="dash-total-products">0</span>
    </div>
    <div class="dash-card">
      <h3>Unidades en stock</h3>
      <span id="dash-total-qty">0</span>
    </div>
    <div class="dash-card">
      <h3>Valor total (Lps.)</h3>
      <span id="dash-total-value">0</span>
    </div>
    <div class="dash-card">
      <h3>Agotados</h3>
      <span id="dash-out-count">0</span>
    </div>
  </div>

  <!-- FILTROS -->
  <div class="filters">
    <select id="inv-filter">
      <option value="all">Todas</option>
    </select>

    <select id="inv-stock-filter">
      <option value="all">Todo</option>
      <option value="in">Disponible</option>
      <option value="out">Agotado</option>
    </select>

    <input id="inv-min-price" type="number" placeholder="Precio mínimo">
    <input id="inv-max-price" type="number" placeholder="Precio máximo">
  </div>

  <!-- LISTA DE PRODUCTOS -->
  <div id="inv-products"></div>

  <!-- PAGINACIÓN -->
  <div id="inv-pagination"></div>

  <!-- HISTORIAL -->
  <div id="inv-history" class="history-box">
    <h3>Historial reciente</h3>
    <ul id="inv-history-list"></ul>
  </div>
</div>

<!-- MODAL -->
<div id="inv-modal" class="modal">
  <div class="modal-content">

    <h2 id="inv-modal-title">Agregar Producto</h2>

    <!-- CAMPOS PRINCIPALES -->
    <input id="inv-name" placeholder="Nombre del producto">
    <input id="inv-price" type="number" placeholder="Precio">
    <input id="inv-qty" type="number" placeholder="Cantidad">
    <input id="inv-category" placeholder="Categoría">

    <!-- IMÁGENES -->
    <h3 class="section-title">Imágenes del producto</h3>

    <div class="image-upload-box">

      <div class="image-slot">
        <label class="img-label">Imagen 1</label>
        <input type="file" id="inv-img1" accept="image/*" onchange="invPreviewImage(this, 'prev1')">
        <img id="prev1" class="img-preview" alt="">
      </div>

      <div class="image-slot">
        <label class="img-label">Imagen 2</label>
        <input type="file" id="inv-img2" accept="image/*" onchange="invPreviewImage(this, 'prev2')">
        <img id="prev2" class="img-preview" alt="">
      </div>

      <div class="image-slot">
        <label class="img-label">Imagen 3</label>
        <input type="file" id="inv-img3" accept="image/*" onchange="invPreviewImage(this, 'prev3')">
        <img id="prev3" class="img-preview" alt="">
      </div>

      <div class="image-slot">
        <label class="img-label">Imagen 4</label>
        <input type="file" id="inv-img4" accept="image/*" onchange="invPreviewImage(this, 'prev4')">
        <img id="prev4" class="img-preview" alt="">
      </div>

      <div class="image-slot">
        <label class="img-label">Imagen 5</label>
        <input type="file" id="inv-img5" accept="image/*" onchange="invPreviewImage(this, 'prev5')">
        <img id="prev5" class="img-preview" alt="">
      </div>

    </div>

    <!-- BOTONES -->
    <button onclick="invSaveProduct()">Guardar</button>
    <button onclick="invCloseModal()">Cerrar</button>

  </div>
</div>
