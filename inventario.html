<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventario SD-Comayagua</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-wrapper">

  <header class="top-bar">
    <button class="btn-secondary" onclick="invLogout()">Cerrar sesión</button>

    <select id="inv-items-per-page" onchange="invChangeItemsPerPage()">
      <option value="5">5 por página</option>
      <option value="10" selected>10 por página</option>
      <option value="20">20 por página</option>
      <option value="50">50 por página</option>
    </select>

    <button class="btn-primary btn-add" onclick="invOpenModal()">Agregar producto</button>
  </header>

  <section class="dashboard">
    <div class="dash-card">
      <p>Total productos</p>
      <h2 id="dash-total-products">0</h2>
    </div>
    <div class="dash-card">
      <p>Unidades en stock</p>
      <h2 id="dash-total-qty">0</h2>
    </div>
    <div class="dash-card">
      <p>Valor total (Lps.)</p>
      <h2 id="dash-total-value">0</h2>
    </div>
    <div class="dash-card">
      <p>Agotados</p>
      <h2 id="dash-out-count">0</h2>
    </div>
  </section>

  <section class="filters">
    <div class="field-group inline">
      <label>Categoría</label>
      <select id="inv-filter">
        <option value="all">Todas</option>
      </select>
    </div>

    <div class="field-group inline">
      <label>Stock</label>
      <select id="inv-stock-filter">
        <option value="all">Todo</option>
        <option value="in">Disponible</option>
        <option value="out">Agotado</option>
      </select>
    </div>

    <div class="field-group inline">
      <label>Precio mínimo</label>
      <input id="inv-min-price" type="number" placeholder="0">
    </div>

    <div class="field-group inline">
      <label>Precio máximo</label>
      <input id="inv-max-price" type="number" placeholder="0">
    </div>
  </section>

  <section id="inv-products" class="products-list"></section>

  <section id="inv-pagination" class="pagination"></section>

  <section class="history-card">
    <h3>Historial reciente</h3>
    <ul id="inv-history-list"></ul>
  </section>

</div>

<!-- MODAL -->
<div id="inv-modal" class="modal">
  <div class="modal-content">
    <h2 id="inv-modal-title">Agregar producto</h2>

    <div class="field-group">
      <label>Nombre</label>
      <input id="inv-name" placeholder="Nombre del producto">
    </div>

    <div class="field-group">
      <label>Precio</label>
      <input id="inv-price" type="number" placeholder="0.00">
    </div>

    <div class="field-group">
      <label>Cantidad</label>
      <input id="inv-qty" type="number" placeholder="0">
    </div>

    <div class="field-group">
      <label>Categoría</label>
      <input id="inv-category" placeholder="Ej: Audífonos, Mouse, Teclado">
    </div>

    <h3 class="section-title">Imágenes del producto</h3>

    <div class="image-upload-box">
      <div class="image-slot">
        <label class="img-label">Imagen 1</label>
        <input type="file" id="inv-img1" accept="image/*" onchange="invPreviewImage(this, 'prev1')">
        <img id="prev1" class="img-preview" alt="">
      </div>

      <div class="image-slot">
        <label class="img-label">Imagen 2</label>
        <input type="file" id="inv-img2" accept="image/*" onchange="invPreviewImage(this, 'prev2')">
        <img id="prev2" class="img-preview" alt="">
      </div>

      <div class="image-slot">
        <label class="img-label">Imagen 3</label>
        <input type="file" id="inv-img3" accept="image/*" onchange="invPreviewImage(this, 'prev3')">
        <img id="prev3" class="img-preview" alt="">
      </div>

      <div class="image-slot">
        <label class="img-label">Imagen 4</label>
        <input type="file" id="inv-img4" accept="image/*" onchange="invPreviewImage(this, 'prev4')">
        <img id="prev4" class="img-preview" alt="">
      </div>

      <div class="image-slot">
        <label class="img-label">Imagen 5</label>
        <input type="file" id="inv-img5" accept="image/*" onchange="invPreviewImage(this, 'prev5')">
        <img id="prev5" class="img-preview" alt="">
      </div>
    </div>

    <button class="btn-primary" onclick="invSaveProduct()">Guardar</button>
    <button class="btn-secondary" onclick="invCloseModal()">Cerrar</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
